services:
  infinity-comfyui:
    build:
      context: .
    image: infinity-comfyui:local
    restart: always
    ports:
      - "127.0.0.1:7930:7930"
    environment:
      HOST: 0.0.0.0
      PORT: 7930
      COMFY_PROXY_LOOPBACK_HOST: host.docker.internal
      COMFY_PROXY_TARGET_BASE: "${COMFY_PROXY_TARGET_BASE:-http://127.0.0.1:27707}"
      COMFY_PROXY_TARGET_BASES: "${COMFY_PROXY_TARGET_BASES:-}"
      COMFY_PROXY_APP_ORIGINS: "${COMFY_PROXY_APP_ORIGINS:-http://127.0.0.1:7930}"
      COMFY_PROXY_BEARER_TOKEN: "${COMFY_PROXY_BEARER_TOKEN:-}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
