services:
  infinity-comfyui:
    build:
      context: .
    image: infinity-comfyui:local
    restart: always
    ports:
      - "7930:7930"
    environment:
      HOST: 0.0.0.0
      PORT: 7930
      COMFY_PROXY_LOOPBACK_HOST: host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
