<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Open ComfyUI in Infinity</title>
    <style>
      :root { color-scheme: dark; font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #151719; color: #eef7f6; }
      main { width: min(520px, calc(100vw - 32px)); padding: 30px; border: 1px solid #315653; border-radius: 18px; background: #1d2425; box-shadow: 0 24px 72px #0008; }
      .eyebrow { color: #70d9d0; font-size: 12px; font-weight: 800; letter-spacing: .12em; text-transform: uppercase; }
      h1 { margin: 10px 0 8px; font-size: clamp(24px, 5vw, 34px); line-height: 1.1; }
      p { margin: 0; color: #afbfbd; line-height: 1.6; }
      .actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 24px; }
      button, a { min-height: 42px; padding: 0 16px; border: 1px solid #41615f; border-radius: 10px; color: #eef7f6; background: #27302f; font: inherit; font-weight: 750; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; }
      button { border-color: #39b9ae; background: #11828a; }
      button:disabled { opacity: .6; cursor: wait; }
      #status { min-height: 24px; margin-top: 16px; color: #f6c76b; font-size: 13px; }
    </style>
  </head>
  <body>
    <main>
      <span class="eyebrow">ComfyUI · browser permission</span>
      <h1>Continue inside Infinity</h1>
      <p>
        Your browser keeps this ComfyUI login separate from other sites. Continue once, then enter the
        ComfyUI page password yourself. Infinity never receives or submits that password.
      </p>
      <div class="actions">
        <button id="continue" type="button">Continue to ComfyUI</button>
        <a id="separate" target="_blank" rel="noreferrer">Open separately</a>
      </div>
      <div id="status" role="status" aria-live="polite"></div>
    </main>
    <script>
      const button = document.querySelector('#continue')
      const separate = document.querySelector('#separate')
      const status = document.querySelector('#status')
      const requestedTarget = new URLSearchParams(location.search).get('target') || '/'
      let target
      try {
        target = new URL(requestedTarget, location.origin)
        if (target.origin !== location.origin || !['http:', 'https:'].includes(target.protocol)) throw new Error()
        for (const key of [...target.searchParams.keys()]) {
          if (key.toLowerCase() === 'token') target.searchParams.delete(key)
        }
        target.hash = ''
      } catch {
        target = new URL('/', location.origin)
      }
      separate.href = target.toString()

      const enterComfy = () => location.replace(target.toString())
      const alreadyGranted = async () => {
        if (typeof document.hasStorageAccess !== 'function') return true
        try { return await document.hasStorageAccess() } catch { return false }
      }

      alreadyGranted().then((granted) => {
        if (granted) enterComfy()
      })

      button.addEventListener('click', async () => {
        button.disabled = true
        status.textContent = 'Requesting browser access…'
        try {
          if (typeof document.requestStorageAccess === 'function') await document.requestStorageAccess()
          enterComfy()
        } catch {
          status.textContent = 'Access was not granted. Open ComfyUI separately, sign in, then return and retry.'
          button.disabled = false
        }
      })
    </script>
  </body>
</html>
